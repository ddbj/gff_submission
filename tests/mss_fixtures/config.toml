[source]
organism = "Marchantia polymorpha subsp. ruderalis"
mol_type = "genomic DNA"
[source.chromosome]
pattern = "^chr(.+)$"
[source.ff_definition]
chromosome = "@@[organism]@@ DNA, chromosome: @@[chromosome]@@"
default = "@@[organism]@@ DNA, @@[entry]@@"
[locus_tag]
prefix = "MPTK1"
[cds]
transl_table = 1
[assembly_gap]
min_length = 10
